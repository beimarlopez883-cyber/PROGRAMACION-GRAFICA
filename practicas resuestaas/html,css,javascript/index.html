<!DOCTYPE html>
<html>
<head>
    <title>Iniciales en 3D</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r110/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.110.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color("black");
let camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.set(10, 6, 15);
let controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.update();
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(10, 10, 10);
scene.add(light);
const material = new THREE.MeshStandardMaterial({ color: 0x00ffcc });

// FUNCIÓN BLOQUE
function crearBloque(w, h, d, x, y, z) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mesh = new THREE.Mesh(geo, material);
    mesh.position.set(x, y, z);
    scene.add(mesh);
}

//B
crearBloque(1, 5, 1, -6, 2, 0);
crearBloque(3, 1, 1, -4.5, 4, 0);
crearBloque(3, 1, 1, -4.5, 2, 0);
crearBloque(3, 1, 1, -4.5, 0, 0);
crearBloque(1, 2, 1, -3, 3, 0);
crearBloque(1, 2, 1, -3, 1, 0);

// C
crearBloque(1, 5, 1, 1, 2, 0);
crearBloque(3, 1, 1, 3, 4, 0);
crearBloque(3, 1, 1, 3, 0, 0);
//L
crearBloque(1,5, 1, 8, 2, 0);
crearBloque(3, 1, 1, 9, 0, 0);
// puntos 
crearBloque(1,1,1,-1,0,0);
crearBloque(1,1,1, 6,0,0);
crearBloque(1,1,1, 12,0,0 );
  
function animate() {
    requestAnimationFrame(animate);
    controls.update(); 
    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
