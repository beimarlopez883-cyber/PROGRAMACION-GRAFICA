<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Practica 10 - Robot 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #222; font-family: Arial, sans-serif; color: white; }

    /* ENCABEZADO */
    .encabezado {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: white;
      color: black;
      padding: 10px 20px;
    }
    .encabezado img {
      height: 70px;
    }
    .encabezado .texto {
      text-align: center;
    }
    .encabezado .texto p {
      font-size: 13px;
      font-weight: bold;
    }
    .encabezado .texto small {
      font-size: 11px;
    }
    .titulo {
      text-align: center;
      padding: 10px;
      background: #111;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    canvas { display: block; }
  </style>
</head>
<body>

  <!-- ENCABEZADO UNIVERSIDAD -->
  <div class="encabezado">
    <div class="texto">
      <p>UNIVERSIDAD NACIONAL "SIGLO XX"</p>
      <p>ÁREA DE TECNOLOGÍA</p>
      <small>CARRERA INGENIERÍA INFORMÁTICA</small>
    </div>
  </div>

  <!-- TITULO PRACTICA -->
  <div class="titulo">PROGRAMACIÓN GRÁFICA &nbsp;|&nbsp; PRÁCTICA 10 &nbsp;|&nbsp; ROBOT 3D</div>

  <!-- CANVAS THREE.JS -->
  <canvas id="c"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>

    // escena
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 10);

    var renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c') });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x222222);

    // luz
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    var luz = new THREE.DirectionalLight(0xffffff, 1);
    luz.position.set(5, 10, 5);
    scene.add(luz);

    // colores
    var azul = new THREE.MeshPhongMaterial({ color: 0x2266cc });
    var gris = new THREE.MeshPhongMaterial({ color: 0x888888 });
    var rojo = new THREE.MeshPhongMaterial({ color: 0xcc2222 });

    // CABEZA - cubo
    var cabeza = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), azul);
    cabeza.position.y = 4;
    scene.add(cabeza);

    // CUERPO - cubo grande
    var cuerpo = new THREE.Mesh(new THREE.BoxGeometry(2, 2.5, 1), gris);
    cuerpo.position.y = 2;
    scene.add(cuerpo);

    // BRAZO IZQUIERDO - cubo
    var brazoIzq = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2, 0.6), azul);
    brazoIzq.position.set(-1.5, 2, 0);
    scene.add(brazoIzq);

    // BRAZO DERECHO - cubo
    var brazoDer = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2, 0.6), azul);
    brazoDer.position.set(1.5, 2, 0);
    scene.add(brazoDer);

    // MANO IZQUIERDA - esfera
    var manoIzq = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), rojo);
    manoIzq.position.set(-1.5, 0.7, 0);
    scene.add(manoIzq);

    // MANO DERECHA - esfera
    var manoDer = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), rojo);
    manoDer.position.set(1.5, 0.7, 0);
    scene.add(manoDer);

    // PIERNA IZQUIERDA - cubo
    var piernaIzq = new THREE.Mesh(new THREE.BoxGeometry(0.7, 2, 0.7), gris);
    piernaIzq.position.set(-0.6, -0.3, 0);
    scene.add(piernaIzq);

    // PIERNA DERECHA - cubo
    var piernaDer = new THREE.Mesh(new THREE.BoxGeometry(0.7, 2, 0.7), gris);
    piernaDer.position.set(0.6, -0.3, 0);
    scene.add(piernaDer);

    // PIE IZQUIERDO - cono (triangulo)
    var pieIzq = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.5, 4), rojo);
    pieIzq.position.set(-0.6, -1.55, 0.2);
    pieIzq.rotation.x = -Math.PI / 2;
    scene.add(pieIzq);

    // PIE DERECHO - cono (triangulo)
    var pieDer = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.5, 4), rojo);
    pieDer.position.set(0.6, -1.55, 0.2);
    pieDer.rotation.x = -Math.PI / 2;
    scene.add(pieDer);

    // girar con mouse
    var girando = false;
    var mouseX = 0;
    var rotY = 0;

    document.addEventListener('mousedown', function(e){ girando = true; mouseX = e.clientX; });
    document.addEventListener('mouseup',   function(){ girando = false; });
    document.addEventListener('mousemove', function(e){
      if(girando){
        rotY += (e.clientX - mouseX) * 0.01;
        mouseX = e.clientX;
      }
    });

    // animacion
    function animar() {
      requestAnimationFrame(animar);
      rotY += 0.005;
      scene.rotation.y = rotY;
      renderer.render(scene, camera);
    }
    animar();

  </script>
</body>
</html>
