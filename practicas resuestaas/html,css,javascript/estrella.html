<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>ESTRELLA</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/108/three.min.js"></script>
    <script>
        var scene;
        var camera;
        var renderer;

        function crearEstrella(x, y, tamaño) {
            const material = new THREE.LineBasicMaterial({ color: 0xFFD700 });

            const points = [];

            // 5 puntas de la estrella
            for (let i = 0; i <= 10; i++) {
                let angulo = i * Math.PI / 5;
                let radio = (i % 2 === 0) ? tamaño : tamaño / 2;
                
                let px = x + Math.cos(angulo - Math.PI / 2) * radio;
                let py = y + Math.sin(angulo - Math.PI / 2) * radio;

                points.push(new THREE.Vector3(px, py, 0));
            }

            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const estrella = new THREE.Line(geometry, material);

            scene.add(estrella);
        }

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );

            camera.position.z = 8;

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Dibujar estrellas
            crearEstrella(0, 0, 2);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
