<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cubo animado</title>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/108/three.min.js"></script>
<script>
var escena, cam, render, cubito;
function iniciar(){
    escena = new THREE.Scene();
    cam = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight, 0.1,1000 );
    cam.position.z = 5;
    render = new THREE.WebGLRenderer();
    render.setSize(window.innerWidth, window.innerHeight);
    render.setClearColor(0x808080);
    document.body.appendChild(render.domElement);

    var forma = new THREE.BoxGeometry(2,2,2);
    var material = new THREE.MeshBasicMaterial({ color: 0x1c1c1c });
    cubito = new THREE.Mesh(forma, material);
    escena.add(cubito);
    animar();
} 
iniciar();
</script>
</body>
</html>
